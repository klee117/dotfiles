# /etc/wsl.conf — per-distro WSL settings (lives inside Ubuntu)
# Apply with:  wsl --shutdown   (from PowerShell), then reopen the distro.

[boot]
# Run systemd as PID 1 (you're already using it — keeps services working).
systemd = true
# On every WSL start, re-attach + mount the external drive by triggering the
# pre-elevated Windows task "WSL Mount External". Closes the WSL-restart gap
# (the logon task only fires at Windows logon, not on a mid-session VM restart).
command = /usr/local/sbin/wsl-boot-mount.sh

[automount]
# Auto-mount Windows drives at /mnt/c, /mnt/d, etc.
enabled = true
# Mount root. Leave as /mnt unless you have a reason to change it.
root = "/mnt/"
# metadata: lets Linux store chmod/chown/permissions on Windows files (needed for git, ssh keys on /mnt).
# umask 22 -> dirs 755, fmask 11 -> files 644 (Windows files not world/group writable or executable).
options = "metadata,umask=22,fmask=11"
# Don't auto-mount entries from Windows /etc/fstab-style network shares.
mountFsTab = false

[interop]
# Allow launching Windows .exe files from inside WSL (e.g. `explorer.exe .`).
# Set to false if you never need to run Windows binaries from the shell (smaller attack surface).
enabled = true
# Do NOT import the Windows PATH into Linux.
# This is the security + cleanliness win: stops the "Failed to translate 'C:\Users\...'"
# warnings and prevents accidental execution of Windows binaries via PATH.
appendWindowsPath = false

[network]
# Generate /etc/resolv.conf and /etc/hosts automatically (keeps DNS working via systemd-resolved).
generateResolvConf = true
generateHosts = true

[user]
# Default login user when you open the distro.
default = klee1
